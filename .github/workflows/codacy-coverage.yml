name: Codacy Coverage
on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile --prefer-offline
          else
            yarn install --frozen-lockfile --prefer-offline
          fi

      - name: Run frontend tests with coverage
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm run test-ci -- --passWithNoTests || pnpm exec jest --coverage --coverageReporters=cobertura --coverageDirectory=.artifacts/coverage --passWithNoTests
          else
            yarn test-ci --passWithNoTests || ./node_modules/.bin/jest --coverage --coverageReporters=cobertura --coverageDirectory=.artifacts/coverage --passWithNoTests
          fi
        continue-on-error: true

      - name: Upload coverage to Codacy
        uses: codacy/codacy-coverage-reporter-action@v1
        if: ${{ hashFiles('.artifacts/coverage/cobertura-coverage.xml') != '' }}
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: .artifacts/coverage/cobertura-coverage.xml
